services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: flod
      POSTGRES_PASSWORD: flod_dev_password
      POSTGRES_DB: flod_dev
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flod -d flod_dev"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      target: production
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://flod:flod_dev_password@db:5432/flod_dev
      PORT: "3000"
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      CORS_ORIGIN: ${CORS_ORIGIN:-*}
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
