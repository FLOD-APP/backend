name: CI

on:
  pull_request:
    branches: [main, development]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run typecheck

      - name: ESLint
        run: npx eslint src/ tests/

      - name: Prettier
        run: npx prettier --check src/ tests/

      - name: Unit tests
        run: npx jest tests/unit/ --no-cache --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

  integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: flod
          POSTGRES_PASSWORD: flod_dev_password
          POSTGRES_DB: flod_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U flod -d flod_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://flod:flod_dev_password@localhost:5432/flod_dev
      JWT_SECRET: ci-test-secret-at-least-32-characters-long
      JWT_REFRESH_SECRET: ci-test-refresh-secret-at-least-32-chars
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run migrations
        run: npm run migrate

      - name: Run seed
        run: npm run seed

      - name: Integration tests
        run: npx jest tests/integration/ --no-cache --no-coverage
